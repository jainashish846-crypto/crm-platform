<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cyber Resilience Unified Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f9;
    --panel:#ffffff;
    --ink:#0c1024;
    --ink-2:#1a1d36;
    --muted:#5a607a;
    --muted-2:#8a91aa;
    --line:#e4e6f0;
    --line-2:#eef0f6;
    --brand:#a100ff;
    --brand-2:#7400b8;
    --brand-3:#e1c8ff;
    --brand-bg:#fdfaff;
    --teal:#00b4a6;
    --teal-bg:#e6faf8;
    --amber:#d97706;
    --amber-bg:#fffbeb;
    --green:#059669;
    --green-bg:#ecfdf5;
    --chip:#f1f3fa;
    --radius:14px;
    --shadow-sm:0 1px 2px rgba(12,16,36,.04),0 1px 3px rgba(12,16,36,.04);
    --shadow:0 4px 24px -8px rgba(12,16,36,.10),0 2px 8px -2px rgba(12,16,36,.06);
    --shadow-lg:0 24px 60px -20px rgba(12,16,36,.20),0 8px 24px -8px rgba(12,16,36,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}

  /* ========= LOGIN PAGE ========= */
  #page-login{position:fixed;inset:0;background:linear-gradient(135deg,#0a0018 0%,#1a0033 40%,#3d0066 70%,#7400b8 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:100}
  #page-login::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(161,0,255,.30) 0%,transparent 70%);pointer-events:none}
  #page-login::after{content:"";position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,180,166,.20) 0%,transparent 70%);pointer-events:none}
  .login-card{position:relative;z-index:2;text-align:center;color:#fff;padding:40px;max-width:640px;animation:fadeIn .6s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .login-brand{display:inline-flex;align-items:center;gap:12px;margin-bottom:32px}
  .login-brand .gt{font-size:36px;font-weight:800;color:#a100ff;line-height:1}
  .login-brand-txt{font-size:14px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.7)}
  .login-title{font-size:52px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:0 0 20px}
  .login-taglines{display:flex;flex-direction:column;gap:8px;margin:32px 0 44px;font-size:19px;font-weight:500;color:rgba(255,255,255,.90);letter-spacing:-.01em}
  .login-taglines .l{display:inline-flex;align-items:center;justify-content:center;gap:10px}
  .login-taglines .l::before{content:"";width:6px;height:6px;background:var(--brand);border-radius:50%}
  .login-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 40px;background:linear-gradient(135deg,#a100ff,#7400b8);color:#fff;border:0;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(161,0,255,.40);transition:all .2s;letter-spacing:.02em}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(161,0,255,.55)}
  .login-btn svg{width:18px;height:18px}
  .login-footer{margin-top:40px;font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.04em}

  /* ========= APP LAYOUT ========= */
  #app{display:none;min-height:100vh}
  #app.on{display:grid;grid-template-columns:260px 1fr}
  @media(max-width:900px){#app.on{grid-template-columns:1fr}}
  .app-topbar{display:none}
  @media(max-width:900px){
    .app-topbar{display:flex;align-items:center;justify-content:space-between;background:#0f0322;color:#fff;padding:12px 20px;position:sticky;top:0;z-index:20}
    .app-topbar .tb-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;cursor:pointer}
  }

  /* ========= SIDEBAR ========= */
  .sidebar{background:#0f0322;color:#fff;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
  @media(max-width:900px){.sidebar{position:relative;height:auto}}
  .sb-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
  .sb-brand:hover{background:rgba(255,255,255,.03)}
  .sb-brand .gt-box{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#7400b8,#a100ff);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;box-shadow:0 4px 14px rgba(161,0,255,.40);flex-shrink:0;letter-spacing:-.02em}
  .sb-brand-txt{font-size:16px;font-weight:800;letter-spacing:-.015em;line-height:1.15}
  .sb-brand-sub{font-size:10px;color:#a100ff;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

  /* Step tracker in sidebar */
  .sb-steps{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:0}
  .sb-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative}
  .sb-step .dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.20);background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.35);transition:all .15s}
  .sb-step.done .dot{background:#a100ff;border-color:#a100ff;color:#fff}
  .sb-step.active .dot{background:linear-gradient(135deg,#a100ff,#7400b8);border-color:#a100ff;color:#fff;box-shadow:0 0 10px rgba(161,0,255,.50)}
  .sb-step .lbl{font-size:7.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.30);text-align:center;white-space:nowrap}
  .sb-step.done .lbl,.sb-step.active .lbl{color:rgba(255,255,255,.75)}
  .sb-step-line{flex:0 0 auto;width:20px;height:2px;background:rgba(255,255,255,.10);margin-top:-10px}
  .sb-step-line.done{background:#a100ff}

  .sb-section{padding:0 10px;margin-bottom:10px;margin-top:12px}
  .sb-section-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:0 8px;margin-bottom:6px}
  .sb-item{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,.70);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:all .12s;margin-bottom:1px}
  .sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .sb-item.on{background:linear-gradient(135deg,#7400b8,#a100ff);color:#fff;font-weight:600}
  .sb-item .cnt{font-size:11px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:999px;font-weight:600}
  .sb-item.on .cnt{background:rgba(255,255,255,.25)}
  .sb-item.dev{opacity:.55}
  .sb-item .dev-tag{font-size:9px;background:var(--amber);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.04em}
  .sb-nav{padding:12px 20px;font-size:11px;color:rgba(255,255,255,.40);border-top:1px solid rgba(255,255,255,.06);margin-top:auto}
  .sb-nav a{display:block;padding:6px 0;color:rgba(255,255,255,.55);cursor:pointer}
  .sb-nav a:hover{color:#fff}

  /* ========= MAIN AREA ========= */
  .main{padding:32px 44px 60px;min-height:100vh}
  @media(max-width:900px){.main{padding:20px 20px 40px}}

  /* Breadcrumb + selected badge strip */
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
  .breadcrumb .b-step{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:600;font-size:13px}
  .breadcrumb .b-step.done{background:var(--brand-bg);border-color:var(--brand-3);color:var(--brand-2)}
  .breadcrumb .b-step.done::before{content:"✓";font-weight:700}
  .breadcrumb .b-step.active{background:linear-gradient(135deg,#7400b8,#a100ff);border-color:transparent;color:#fff;font-weight:700;padding:7px 18px;font-size:13.5px}
  .breadcrumb .b-arrow{color:var(--brand);font-size:16px;font-weight:800;cursor:default;padding:0}

  .sel-strip{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:18px 0 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .sel-strip .sl{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .sel-strip .sc{font-size:14px;font-weight:600;padding:7px 14px;background:linear-gradient(135deg,#f3e7ff,#fde6ff);color:var(--brand-2);border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .sel-strip .sc-off{background:var(--teal-bg);color:var(--teal)}
  .sel-strip .change{margin-left:auto;font-size:13px;font-weight:600;color:var(--brand-2);cursor:pointer;padding:6px 14px;border-radius:6px}
  .sel-strip .change:hover{background:var(--brand-bg)}

  .page-head{margin-bottom:16px}
  .page-title{font-size:22px;font-weight:800;letter-spacing:-.025em;margin:0 0 6px;color:var(--ink)}
  .page-sub{font-size:14.5px;color:var(--muted);line-height:1.55;max-width:640px}

  /* ========= SERVICE / OFFERING CARDS ========= */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
  .sel-card{background:#fff;border:2px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column;gap:5px;min-height:auto}
  .sel-card:hover{border-color:var(--brand-3);transform:translateY(-2px);box-shadow:var(--shadow)}
  .sel-card.on{border-color:var(--brand);background:linear-gradient(180deg,#fdfaff 0%,#fff 100%);box-shadow:0 0 0 3px rgba(161,0,255,.10)}
  .sel-card.dev{opacity:.65;cursor:not-allowed}
  .sel-card.dev:hover{transform:none;box-shadow:none;border-color:var(--line)}
  .sel-card-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:5px;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .sel-card.on .sel-card-check{background:linear-gradient(135deg,#7400b8,#a100ff);border-color:transparent;color:#fff}
  .sel-card-check svg{width:10px;height:10px;opacity:0}
  .sel-card.on .sel-card-check svg{opacity:1}
  .sel-card-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f3e7ff,#fde6ff);color:var(--brand-2);display:flex;align-items:center;justify-content:center;margin-bottom:2px}
  .sel-card-icon svg{width:16px;height:16px}
  .sel-card-name{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.25;padding-right:24px}
  .sel-card-desc{font-size:11.5px;color:var(--muted);line-height:1.4;flex:1}
  .sel-card-meta{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;color:var(--muted);margin-top:4px}
  .sel-card-meta .m{display:inline-flex;align-items:center;gap:4px}
  .sel-card .dev-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;background:var(--amber-bg);color:var(--amber);padding:2px 6px;border-radius:999px;letter-spacing:.04em}

  /* ========= CTA / STEP FOOTER ========= */
  .step-footer{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:16px;flex-wrap:wrap}
  .step-back{padding:10px 20px;background:#fff;border:1px solid var(--line);border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  .step-back:hover{border-color:var(--brand-3);color:var(--ink)}
  .step-next{padding:12px 26px;background:linear-gradient(135deg,#7400b8,#a100ff);color:#fff;border:0;border-radius:999px;font-size:13.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(161,0,255,.28);transition:all .15s}
  .step-next:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 28px rgba(161,0,255,.40)}
  .step-next:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .step-next svg{width:14px;height:14px}
  .step-footer-hint{font-size:12px;color:var(--muted);flex:1;text-align:center}

  /* ========= TOOL CARDS (PAGE 3) ========= */
  .tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
  .tool-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column;min-height:280px}
  .tool-card:hover{border-color:var(--brand-3);transform:translateY(-2px);box-shadow:var(--shadow)}
  .tool-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
  .tool-card-name{font-size:20px;font-weight:800;letter-spacing:-.015em;color:var(--ink);line-height:1.2;margin:0}
  .tool-card-acro{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:4px;display:block}
  .tool-source{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.04em;white-space:nowrap}
  .tool-source.accenture{background:linear-gradient(135deg,#f3e7ff,#fde6ff);color:var(--brand-2)}
  .tool-source.partner{background:var(--amber-bg);color:var(--amber)}
  .tool-source.global{background:var(--teal-bg);color:var(--teal)}
  .tool-card-desc{font-size:13px;line-height:1.55;color:var(--muted);margin:6px 0 14px;flex:1}
  .tool-card-supports{background:var(--brand-bg);border-radius:8px;padding:10px 12px;margin-bottom:12px}
  .tool-card-supports .lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .tool-card-supports .item{font-size:12px;color:var(--ink-2);padding:2px 0;display:flex;align-items:center;gap:6px;font-weight:500}
  .tool-card-supports .item::before{content:"✓";color:var(--green);font-weight:700;flex-shrink:0}
  .tool-card-meta{display:flex;align-items:center;gap:12px;font-size:11.5px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .tool-card-meta .m b{color:var(--ink);font-weight:600}
  .tool-card-cta{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;background:var(--chip);color:var(--ink-2);border:1px solid var(--line);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:auto}
  .tool-card-cta:hover{background:linear-gradient(135deg,var(--brand-2),var(--brand));color:#fff;border-color:transparent}
  .tool-card-cta svg{width:12px;height:12px}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px}
  .empty .ic{font-size:44px;opacity:.4;margin-bottom:14px}
  .empty .t{font-size:16px;font-weight:600;color:var(--ink-2);margin-bottom:4px}
  .empty .s{font-size:13px}

  /* Tool page filter bar */
  .tool-filter-bar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .tool-filter-row{margin-bottom:12px}
  .tool-filter-row:last-child{margin-bottom:0}
  .tool-filter-row .tf-lbl{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .tool-filter-row .tf-pills{display:flex;flex-wrap:wrap;gap:6px}
  .tf-pill{padding:6px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
  .tf-pill:hover{border-color:var(--brand-3);color:var(--ink)}
  .tf-pill.on{background:linear-gradient(135deg,var(--brand-2),var(--brand));color:#fff;border-color:transparent}
  .tf-pill.svc-on{background:linear-gradient(135deg,#f3e7ff,#fde6ff);color:var(--brand-2);border-color:var(--brand-3)}
  .tf-pill.off-on{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bdr)}
  .tf-pill .cnt{font-size:10px;opacity:.75}
  .tf-clear{font-size:11px;color:var(--brand-2);cursor:pointer;font-weight:600;margin-left:8px;padding:2px 8px;border-radius:4px}
  .tf-clear:hover{background:var(--brand-bg)}

  /* Cyber.AI advisory panel */
  .cyberai-panel{background:linear-gradient(135deg,#0a0018 0%,#1a0033 50%,#3d0066 100%);border-radius:14px;padding:24px;margin-top:24px;color:#fff;position:relative;overflow:hidden}
  .cyberai-panel::before{content:"";position:absolute;right:-80px;top:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(161,0,255,.20),transparent 70%);pointer-events:none}
  .cyberai-panel .cp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .cyberai-panel .cp-title{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .cyberai-panel .cp-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .cyberai-panel .cp-desc{font-size:12.5px;line-height:1.55;color:rgba(255,255,255,.75);max-width:600px;margin-bottom:16px}
  .cyberai-panel .cp-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  .cyberai-panel .cp-stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 12px;min-width:80px}
  .cyberai-panel .cp-stat .v{font-size:18px;font-weight:800;color:#fff}
  .cyberai-panel .cp-stat .l{font-size:10px;color:rgba(255,255,255,.60);margin-top:1px}
  .cyberai-missions{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .cyberai-mission{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:14px;transition:all .15s}
  .cyberai-mission:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.18)}
  .cyberai-mission .cm-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .cyberai-mission .cm-name::before{content:"⚡";font-size:12px}
  .cyberai-mission .cm-agents{display:flex;flex-wrap:wrap;gap:4px}
  .cyberai-mission .cm-agent{font-size:10px;padding:3px 8px;background:rgba(255,255,255,.10);border-radius:5px;color:rgba(255,255,255,.80);font-weight:500}
  .cyberai-outcomes{margin-top:14px;display:flex;flex-direction:column;gap:4px}
  .cyberai-outcomes .co{font-size:11.5px;color:rgba(255,255,255,.70);display:flex;align-items:flex-start;gap:6px;line-height:1.4}
  .cyberai-outcomes .co::before{content:"✓";color:#a7f3d0;font-weight:700;flex-shrink:0}

  /* ========= TOOL DETAIL (PAGE 4) ========= */
  .detail-hero{background:linear-gradient(135deg,#1a0033 0%,#3d0066 50%,#7400b8 100%);color:#fff;border-radius:16px;padding:30px 34px;margin-bottom:24px;position:relative;overflow:hidden}
  .detail-hero::before{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%);pointer-events:none}
  .detail-hero .badge-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .detail-hero .badge-row .b{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.04em;background:rgba(255,255,255,.15);color:#fff}
  .detail-hero .badge-row .b.dep{background:rgba(31,184,125,.25);color:#a7f3d0}
  .detail-hero .dt-name{font-size:36px;font-weight:800;letter-spacing:-.025em;margin:0 0 6px;line-height:1.1}
  .detail-hero .dt-acro{font-size:14px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.02em;margin-bottom:14px}
  .detail-hero .dt-desc{font-size:15px;line-height:1.65;color:rgba(255,255,255,.88);max-width:720px}
  .detail-hero .dt-actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}

/* ============================================================
   STATE + ROUTER
   ============================================================ */
let currentStep = 1;
let selectedServices = new Set();
let selectedOfferings = new Set();
let currentToolId = null;
let filterSvc = new Set();
let filterOff = new Set();

function enterConsole(){
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  goToStep(1);
}

function goToStep(step, toolId){
  currentStep = step;
  if(toolId) currentToolId = toolId;
  if(step <= 2){ filterSvc.clear(); filterOff.clear(); }
  render();
  window.scrollTo({top:0,behavior:'smooth'});
  document.querySelector('.sidebar')?.classList.remove('open');
}

function resetAll(){
  selectedServices.clear();
  selectedOfferings.clear();
  filterSvc.clear();
  filterOff.clear();
  currentToolId = null;
  goToStep(1);
}

/* ============================================================
   RENDERERS
   ============================================================ */
function renderSidebar(){
  /* Step tracker */
  const stepsEl = document.getElementById('sb-steps');
  if(stepsEl){
    const steps = [{n:1,l:"Service"},{n:2,l:"Offering"},{n:3,l:"Tools"},{n:4,l:"Details"}];
    stepsEl.innerHTML = steps.map((s,i)=>{
      const cls = currentStep===s.n ? 'active' : (currentStep>s.n ? 'done' : '');
      const line = i<steps.length-1 ? `<div class="sb-step-line ${currentStep>s.n?'done':''}"></div>` : '';
      return `<div class="sb-step ${cls}"><div class="dot">${cls==='done'?'✓':s.n}</div><div class="lbl">${s.l}</div></div>${line}`;
    }).join('');
  }

  /* Services */
  const el = document.getElementById('sb-services');
  el.innerHTML = SERVICES.map(s=>{
    const isOn = selectedServices.has(s.id);
    const isDev = s.status === 'dev';
    return `<div class="sb-item ${isOn?'on':''} ${isDev?'dev':''}" onclick="${isDev?'':'toggleServiceFromSidebar(\''+s.id+'\')'}">
      <span>${s.name}</span>
      ${isDev?`<span class="dev-tag">SOON</span>`:''}
    </div>`;
  }).join('');

  /* Cyber.AI — same style as service items */
  const aiEl = document.getElementById('sb-cyberai-item');
  if(aiEl){
    const isOn = currentToolId === 'cyberai' && currentStep === 4;
    aiEl.innerHTML = `<div class="sb-item ${isOn?'on':''}" onclick="goToStep(4,'cyberai')">
      <span>Cyber.AI Platform</span>
    </div>`;
  }
}

function toggleServiceFromSidebar(id){
  if(selectedServices.has(id)) selectedServices.delete(id);
  else selectedServices.add(id);
  selectedOfferings.clear();
  filterSvc.clear();
  filterOff.clear();
  if(currentStep === 4) goToStep(3);
  else render();
}

function renderBreadcrumb(){
  const steps = [
    {n:1,l:"Select Service"},
    {n:2,l:"Select Offering"},
    {n:3,l:"Matching Tools"},
    {n:4,l:"Tool Details"}
  ];
  return `<div class="breadcrumb">
    ${steps.map((s,i)=>{
      const cls = currentStep===s.n ? 'active' : (currentStep>s.n ? 'done' : '');
      const clickable = currentStep>s.n;
      return `<span class="b-step ${cls}" ${clickable?`onclick="goToStep(${s.n})" style="cursor:pointer"`:''}>${s.l}</span>${i<steps.length-1?'<span class="b-arrow">»</span>':''}`;
    }).join('')}
  </div>`;
}

function renderSelStrip(){
  if(currentStep === 1) return '';
  const svcNames = [...selectedServices].map(id=>SERVICES.find(s=>s.id===id)?.name).filter(Boolean);
  const offNames = [];
  selectedServices.forEach(sid=>{
    (OFFERINGS[sid]||[]).forEach(o=>{
      if(selectedOfferings.has(o.id)) offNames.push(o.name);
    });
  });
  return `<div class="sel-strip">
    <span class="sl">Selected:</span>
    ${svcNames.map(n=>`<span class="sc">${n}</span>`).join('')}
    ${offNames.map(n=>`<span class="sc sc-off">${n}</span>`).join('')}
    <span class="change" onclick="goToStep(1)">Change selection</span>
  </div>`;
}

/* PAGE 3 — Matching Tools */
function renderStep3(){
  const main = document.getElementById('main-content');

  /* Collect all selected service names + offering names for filters */
  const selSvcList = [...selectedServices].map(id=>SERVICES.find(s=>s.id===id)).filter(Boolean);
  const selOffList = [];
  selectedServices.forEach(sid=>{
    (OFFERINGS[sid]||[]).forEach(o=>{
      if(selectedOfferings.size===0 || selectedOfferings.has(o.id)){
        if(!selOffList.find(x=>x.id===o.id)) selOffList.push(o);
      }
    });
  });

  /* Filter tools */
  const list = TOOLS.filter(t=>{
    /* Must cover at least one selected service */
    if(!t.services.some(s=>selectedServices.has(s))) return false;
    /* If offerings selected from step 2, must cover at least one */
    if(selectedOfferings.size > 0){
      if(!t.offerings.some(o=>selectedOfferings.has(o))) return false;
    }
    /* Page 3 sub-filter: by service */
    if(filterSvc.size > 0){
      if(!t.services.some(s=>filterSvc.has(s))) return false;
    }
    /* Page 3 sub-filter: by offering */
    if(filterOff.size > 0){
      if(!t.offerings.some(o=>filterOff.has(o))) return false;
    }
    return true;
  });

  const hasFilters = filterSvc.size > 0 || filterOff.size > 0;

  main.innerHTML = `
    ${renderBreadcrumb()}
    ${renderSelStrip()}
    <div class="page-head">
      <h1 class="page-title" style="font-size:20px">Matching tools <span style="font-size:14px;color:var(--muted);font-weight:600">(${list.length})</span></h1>
      <p class="page-sub">Tools below match your selected services${selectedOfferings.size>0?' and offerings':''}. Click any tool for full details.</p>
    </div>

    <div id="tool-list"></div>
    <div class="step-footer">
      <button class="step-back" onclick="goToStep(2)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Offerings
      </button>
      <div style="flex:1"></div>
      <button class="step-back" onclick="resetAll()">Start over</button>
    </div>
  `;

  /* Render tool cards */
  const listEl = document.getElementById('tool-list');
  if(list.length === 0){
    listEl.innerHTML = `<div class="empty">
      <div class="ic">🔎</div>
      <div class="t">We are working on this</div>
      <div class="s">Tool mapping for this combination is in progress. Try selecting a different service or offering.</div>
    </div>`;
    return;
  }

  listEl.innerHTML = `<div class="tool-grid">${list.sort((a,b)=>(a.order||99)-(b.order||99)).map(t=>{
    /* Services this tool covers that the user selected */
    const coveredSvcs = t.services
      .filter(s=>selectedServices.has(s))
      .map(s=>SERVICES.find(x=>x.id===s)).filter(Boolean);

    /* Offerings this tool covers that are relevant */
    const relevantOffIds = new Set();
    selectedServices.forEach(sid=>{
      (OFFERINGS[sid]||[]).forEach(o=>{
        if(selectedOfferings.size===0 || selectedOfferings.has(o.id)){
          if(t.offerings.includes(o.id)) relevantOffIds.add(o.id);
        }
      });
    });
    const coveredOffs = [...relevantOffIds].map(oid=>{
      let found = null;
      Object.values(OFFERINGS).forEach(arr=>{
        const m = arr.find(o=>o.id===oid);
        if(m) found = m;
      });
      return found;
    }).filter(Boolean);

    const sourceLbl = {accenture:'ACCENTURE',partner:'PARTNER',global:'GLOBAL TEAM'}[t.source];

    return `<div class="tool-card" onclick="goToStep(4,'${t.id}')">
      <div class="tool-card-head">
        <div>
          <h3 class="tool-card-name">${t.name}</h3>
          <span class="tool-card-acro">${t.acro}</span>
        </div>
        <span class="tool-source ${t.source}">${sourceLbl}</span>
      </div>
      <div class="tool-card-desc">${t.desc.slice(0,130)}${t.desc.length>130?'…':''}</div>
      <div class="tool-card-supports">
        <div class="lbl">Services Covered</div>
        ${coveredSvcs.map(s=>`<div class="item">${s.name}</div>`).join('')}
      </div>
      ${coveredOffs.length > 0 ? `
      <div class="tool-card-supports" style="background:var(--teal-bg);margin-top:0">
        <div class="lbl" style="color:var(--teal)">Offerings Covered</div>
        ${coveredOffs.map(o=>`<div class="item" style="color:var(--teal)">${o.name}</div>`).join('')}
      </div>` : ''}
      <button class="tool-card-cta">
        View Details
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>`;
  }).join('')}</div>`;
}

/* PAGE 4 — Tool Detail */
function renderStep4(){
  const main = document.getElementById('main-content');
  const t = TOOLS.find(x=>x.id===currentToolId);
  if(!t){ goToStep(3); return; }

  const sourceLbl = {accenture:'ACCENTURE ASSET',partner:'STRATEGIC PARTNER',global:'GLOBAL TEAM'}[t.source];
  const allSvcNames = t.services.map(s=>SERVICES.find(x=>x.id===s)?.name).filter(Boolean);
  const allOfferingNames = [];
  t.services.forEach(sid=>{
    (OFFERINGS[sid]||[]).forEach(o=>{
      if(t.offerings.includes(o.id)) allOfferingNames.push(o.name);
    });
  });
  const uniqOfferings = [...new Set(allOfferingNames)];

  const launchBtn = t.url
    ? `<a class="dt-btn primary" href="${t.url}" target="_blank" rel="noopener noreferrer">
        Launch Tool
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>`
    : `<span class="dt-btn primary" style="opacity:.6;cursor:not-allowed">Launch URL not yet available</span>`;

  main.innerHTML = `
    ${renderBreadcrumb()}
    ${renderSelStrip()}

    <div class="detail-hero">
      <div class="badge-row">
        <span class="b">${sourceLbl}</span>
        <span class="b dep">● Deployed</span>
      </div>
      <h1 class="dt-name">${t.name}</h1>
      <div class="dt-acro">${t.acro}</div>
      <p class="dt-desc">${t.desc}</p>
      <div class="dt-actions">
        ${launchBtn}
        <button class="dt-btn ghost" onclick="goToStep(3)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to tools
        </button>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-panel">
        <h3>Key Metrics</h3>
        <div class="dp-metrics">
          ${Object.entries(t.metrics).map(([k,v])=>`
            <div class="dp-metric"><div class="v">${v}</div><div class="l">${k}</div></div>
          `).join('')}
        </div>
      </div>
      <div class="detail-panel">
        <div class="lbl">Owner</div>
        <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:14px">Accenture Cyber Resilience Practice</div>
        ${t.clients && t.clients.length ? `
          <div class="lbl">Clients / Deployments</div>
          <div class="dp-pills" style="margin-bottom:14px">
            ${t.clients.map(c=>`<span class="dp-pill">${c}</span>`).join('')}
          </div>
        `:''}
        ${t.architecture ? `
          <div class="lbl">Architecture</div>
          <div style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px">${t.architecture}</div>
        `:''}
        <div class="lbl">Documentation</div>
        <div style="font-size:12.5px;color:var(--muted)">Available on internal portal · Contact Cyber Resilience team for access</div>
      </div>
    </div>

    <div class="detail-panel" style="margin-bottom:16px">
      <div class="lbl">Supported Services</div>
      <div class="dp-pills" style="margin-bottom:16px">
        ${allSvcNames.map(n=>`<span class="dp-pill brand">${n}</span>`).join('')}
      </div>
      <div class="lbl">Supported Offerings</div>
      <div class="dp-pills">
        ${uniqOfferings.map(n=>`<span class="dp-pill">${n}</span>`).join('')}
      </div>
    </div>

    <div class="detail-panel" style="margin-bottom:16px">
      <h3>Sub-services (${t.subServices.length})</h3>
      <div class="dp-pills">
        ${t.subServices.map(s=>`<span class="dp-pill">${s}</span>`).join('')}
      </div>
    </div>

    <div class="detail-panel" style="margin-bottom:16px">
      <h3>Integrations (${t.integrations.length})</h3>
      <div class="dp-pills">
        ${t.integrations.map(i=>`<span class="dp-pill">${i}</span>`).join('')}
      </div>
    </div>

    <div class="detail-panel">
      <h3>Agents (${t.agents.length})</h3>
      <div class="agents-list">
        ${t.agents.map(a=>`
          <div class="agent">
            <div>
              <div class="a-name">${a.n}</div>
              <div class="a-desc">${a.d}</div>
            </div>
            ${a.o && a.o!=='—'?`<div class="a-opt">${a.o}</div>`:''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* Master render */
function render(){
  renderSidebar();
  if(currentStep === 1) renderStep1();
  else if(currentStep === 2) renderStep2();
  else if(currentStep === 3) renderStep3();
  else if(currentStep === 4) renderStep4();
}

/* Init */
renderSidebar();
</script>
</body>
</html>
